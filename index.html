<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our History Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background: #f5f7fb; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #lock-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        #lock-screen h2 { margin-bottom: 20px; color: #333; }
        #password-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; text-align: center; }
        #unlock-btn { background: #ff4b5c; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; width: 100%; }
        #app-container { display: none; flex-direction: column; width: 100%; max-width: 500px; height: 100vh; background: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
        #chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #efeae2; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 8px; font-size: 16px; word-break: break-word; position: relative; }
        .msg.me { background: #d9fdd3; align-self: flex-end; border-top-right-radius: 0; }
        .msg.them { background: #fff; align-self: flex-start; border-top-left-radius: 0; }
        #input-area { display: flex; padding: 10px; background: #f0f0f0; gap: 10px; align-items: center; }
        #msg-input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; font-size: 16px; outline: none; }
        #send-btn { background: #00a884; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <!-- Lock Screen Box -->
    <div id="lock-screen">
        <h2>🔒 Portal Locked</h2>
        <input type="password" id="password-input" placeholder="Enter Secret Code...">
        <button id="unlock-btn" onclick="checkPassword()">Unlock</button>
    </div>

    <!-- Main Application Box -->
    <div id="app-container">
        <div id="chat-messages"></div>
        <div id="input-area">
            <input type="text" id="msg-input" placeholder="Type a message...">
            <button id="send-btn" onclick="sendTextMessage()">➔</button>
        </div>
    </div>

    <!-- Loading JavaScript at the bottom -->
    <script src="script.js"></script>
</body>
</html>
